<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Game App</title>
  <style>
    /* (CSS पहले जैसी ही रखें, बस .game-screen में ये जोड़ें ताकि canvas सेंटर में रहे) */
    #game-play-area { display: flex; flex-direction: column; align-items: center; width: 100%; }
    canvas { background: #1e293b; border-radius: 15px; cursor: crosshair; }
    
    /* ... बाकी CSS वैसी ही रहने दें ... */
  </style>
</head>
<body>

  <script>
    // ================= [1. सुधरा हुआ तीर धनुष गेम लॉजिक] =================
    function startArchery() {
      const canvas = document.getElementById('archery-canvas');
      const ctx = canvas.getContext('2d');
      let score = 0;
      let target = { x: 300, y: 150, radius: 30, speed: 3 };
      let arrow = { x: 50, y: 190, isShot: false, vx: 0 };

      canvas.addEventListener('touchstart', (e) => {
        if (!arrow.isShot) {
          arrow.isShot = true;
          arrow.vx = 12; // तीर की गति
          playSound('click');
        }
      });

      function loop() {
        if (activeGame !== 'archery') return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // टारगेट मूवमेंट
        target.y += target.speed;
        if (target.y - target.radius < 0 || target.y + target.radius > canvas.height) target.speed *= -1;

        // टारगेट ड्रा करें
        ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(target.x, target.y, target.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(target.x, target.y, target.radius*0.6, 0, Math.PI*2); ctx.fill();

        // तीर मूवमेंट
        if (arrow.isShot) {
          arrow.x += arrow.vx;
          // टक्कर चेक करें
          if (arrow.x > target.x - target.radius && Math.abs(arrow.y - target.y) < target.radius) {
            score += 10;
            playSound('success');
            arrow.x = 50; arrow.isShot = false;
          }
          // बाहर जाने पर रीसेट
          if (arrow.x > canvas.width) { arrow.x = 50; arrow.isShot = false; }
        }

        // तीर ड्रा करें
        ctx.fillStyle = '#38bdf8'; ctx.fillRect(arrow.x, arrow.y, 40, 5);
        
        ctx.fillStyle = '#ffffff'; ctx.font = '20px Arial'; ctx.fillText("स्कोर: " + score, 20, 30);
        animationFrameId = requestAnimationFrame(loop);
      }
      loop();
    }

    // (बाकी सब फंक्शन्स जैसे startXO, startNumChallenge, startSnake पहले जैसे ही रखें)
  </script>
</body>
</html>
