<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pro Game App</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* 1. स्प्लैश स्क्रीन (Welcome Animation) की स्टाइल */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .splash-text {
      font-size: 3rem;
      color: #00adb5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: bold;
      animation: popUp 1.2s ease-in-out infinite alternate;
      text-shadow: 0 0 20px rgba(0, 173, 181, 0.5);
    }

    @keyframes popUp {
      0% { transform: scale(0.85); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    /* 2. मुख्य गेम थीम और लेआउट (लाइट/डार्क मोड सपोर्ट) */
    :root {
      --bg-color: #121212;
      --text-color: #ffffff;
      --card-bg: #1a1a1a;
      --btn-bg: #00adb5;
      --btn-text: #ffffff;
    }

    [data-theme="light"] {
      --bg-color: #f5f5f5;
      --text-color: #121212;
      --card-bg: #ffffff;
      --btn-bg: #ff5722;
      --btn-text: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .header {
      width: 90%;
      max-width: 400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .theme-btn {
      background-color: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .mission-box {
      width: 90%;
      max-width: 400px;
      background-color: #00adb5;
      color: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(0, 173, 181, 0.3);
      box-sizing: border-box;
    }

    .menu-title {
      margin-top: 30px;
      font-size: 1.2rem;
      opacity: 0.8;
      width: 90%;
      max-width: 400px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 90%;
      max-width: 400px;
      margin-top: 15px;
    }

    .game-card {
      background-color: var(--card-bg);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 15px 5px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .game-card:hover {
      transform: scale(1.05);
    }

    .card-xo { border-color: #ff2e63; color: #ff2e63; }
    .card-num { border-color: #00adb5; color: #00adb5; }
    .card-snake { border-color: #ffde59; color: #ffde59; }

    .yt-btn {
      width: 90%;
      max-width: 400px;
      background-color: #ff2e63;
      color: white;
      text-align: center;
      padding: 15px;
      border-radius: 12px;
      margin-top: 30px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(255, 46, 99, 0.4);
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <!-- स्प्लैश स्क्रीन (यह ऐप खुलते ही दिखेगी) -->
  <div id="splash-screen">
    <div class="splash-text">🚀 Pro Game</div>
  </div>

  <!-- मुख्य ऐप कंटेंट -->
  <div class="header">
    <h2>नमस्ते, <br><span style="color: #00adb5;">अभिनंदन 🚀</span></h2>
    <button class="theme-btn" id="theme-toggle">☀️ लाइट मोड</button>
  </div>

  <div class="mission-box">
    <h3>मेरा मिशन: ऐप डेवलपर बनना</h3>
    <p>डार्क/लाइट मोड के साथ 3 मज़ेदार गेम्स लाइव हैं!</p>
  </div>

  <div class="menu-title">गेम्स मेन्यू (Select Game)</div>

  <div class="games-grid">
    <div class="game-card card-xo" onclick="alert('Tic-Tac-Toe गेम शुरू हो रहा है!')">
      <b style="font-size: 1.5rem;">XO</b><br><small>Tic-Tac</small>
    </div>
    <div class="game-card card-num" onclick="alert('नंबर चैलेंज गेम शुरू हो रहा है!')">
      <span style="font-size: 1.5rem;">🎮</span><br><small>नंबर चैलेंज</small>
    </div>
    <div class="game-card card-snake" onclick="alert('स्नेक गेम शुरू हो रहा है!')">
      <span style="font-size: 1.5rem;">🐍</span><br><small>स्नेक गेम</small>
    </div>
  </div>

  <a href="https://youtube.com" target="_blank" class="yt-btn">यूट्यूब पर कोडिंग सीखें 📺</a>

  <!-- स्क्रिप्ट्स (एनीमेशन, थीम और सर्विस वर्कर) -->
  <script>
    // 1. स्प्लैश स्क्रीन को 2 सेकंड बाद हटाने का लॉजिक
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500); // पूरी तरह डिलीट करने के लिए
      }, 2000); // 2000ms = 2 सेकंड का इंतज़ार
    });

    // 2. डार्क/लाइट थीम टॉगल लॉजिक
    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.addEventListener('click', () => {
      if (document.body.hasAttribute('data-theme')) {
        document.body.removeAttribute('data-theme');
        toggleBtn.innerText = '☀️ लाइट मोड';
      } else {
        document.body.setAttribute('data-theme', 'light');
        toggleBtn.innerText = '🌙 डार्क मोड';
      }
    });

    // 3. प्रोग्रेसिव ऐप (Service Worker) रजिस्ट्रेशन
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>
</html>
