<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🏰 3D Shiva Palace Fighter</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2e1065; font-family: sans-serif; }
    #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

    /* 🎮 इंडियन गेम स्टाइल UI कंट्रोल्स */
    .gaming-ui {
      position: absolute; bottom: 20px; left: 0; width: 100%;
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 0 20px; box-sizing: border-box; z-index: 10; pointer-events: none;
    }
    .steering-side, .actions-side { display: flex; gap: 15px; pointer-events: auto; }
    .actions-side { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

    .game-ui-btn {
      background: linear-gradient(135deg, #4c1d95, #6d28d9);
      color: white; border: 2px solid #a78bfa; border-radius: 18px;
      font-size: 1.4rem; font-weight: bold; width: 70px; height: 65px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; user-select: none; box-shadow: 0 6px 12px rgba(0,0,0,0.6);
    }
    .game-ui-btn:active { background: #2e1065; transform: scale(0.92); }

    .race-btn { background: linear-gradient(135deg, #16a34a, #15803d); border-color: #22c55e; }
    .brake-btn { background: linear-gradient(135deg, #dc2626, #b91c1c); border-color: #ef4444; }
    
    .fire-ui-btn {
      grid-column: span 2; background: linear-gradient(135deg, #ea580c, #c2410c);
      border: 3px solid #f97316; height: 50px; border-radius: 25px;
      font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;
    }

    #score-board {
      position: absolute; top: 20px; left: 20px; background: rgba(76, 29, 149, 0.8);
      padding: 10px 20px; border-radius: 10px; color: #fbbf24;
      font-weight: bold; font-size: 1.2rem; z-index: 10; border: 2px solid #a78bfa;
    }
  </style>
</head>
<body>

  <div id="score-board">🚨 दुश्मन बचे: <span id="enemy-count">4</span></div>
  <div id="canvas-container"></div>

  <div class="gaming-ui">
    <div class="steering-side">
      <div class="game-ui-btn" id="btn-left">◀️</div>
      <div class="game-ui-btn" id="btn-right">▶️</div>
    </div>

    <div class="actions-side">
      <div class="game-ui-btn brake-btn" id="btn-down">🔽<br><span style="font-size:0.55rem;">BREAK</span></div>
      <div class="game-ui-btn race-btn" id="btn-up">🔼<br><span style="font-size:0.55rem;">RACE</span></div>
      <div class="game-ui-btn fire-ui-btn" id="btn-fire">🔫 FIRE 💥</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // --- 1. SCENE SETUP ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2e1065); // पर्पल महल का बैकग्राउंड माहौल

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // लाइट्स
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xfff7ed, 0.9);
    dirLight.position.set(15, 25, 10);
    scene.add(dirLight);

    // --- 2. 3D PALACE DESIGN (महल का निर्माण) ---
    // पर्पल फर्श
    const floorGeo = new THREE.PlaneGeometry(50, 50);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x4c1d95 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // शाही लाल कारपेट (शाही लुक के लिए)
    const carpetGeo = new THREE.PlaneGeometry(6, 50);
    const carpetMat = new THREE.MeshStandardMaterial({ color: 0xd97706 }); // गोल्डन-रेड वाइब
    const carpet = new THREE.Mesh(carpetGeo, carpetMat);
    carpet.rotation.x = -Math.PI / 2;
    carpet.position.y = 0.01; // फर्श से थोड़ा ऊपर
    scene.add(carpet);

    // गोल्डन पिलर्स (खंभे) बनाने का फंक्शन
    function createPillar(x, z) {
      const pGeo = new THREE.CylinderGeometry(0.4, 0.4, 6, 16);
      const pMat = new THREE.MeshStandardMaterial({ color: 0xf59e0b, metalness: 0.5, roughness: 0.2 });
      const pillar = new THREE.Mesh(pGeo, pMat);
      pillar.position.set(x, 3, z);
      scene.add(pillar);
    }
    // इमेज की तरह महल में खंभे खड़ा करना
    createPillar(-4, 10);  createPillar(4, 10);
    createPillar(-4, 0);   createPillar(4, 0);
    createPillar(-4, -10); createPillar(4, -10);

    // महल की पर्पल दीवारें
    function createWall(w, h, d, x, z) {
      const wallGeo = new THREE.BoxGeometry(w, h, d);
      const wallMat = new THREE.MeshStandardMaterial({ color: 0x6d28d9 });
      const wall = new THREE.Mesh(wallGeo, wallMat);
      wall.position.set(x, h/2, z);
      scene.add(wall);
    }
    createWall(50, 6, 1, 0, -25); // बैक वॉल
    createWall(1, 6, 50, -25, 0); // लेफ्ट वॉल
    createWall(1, 6, 50, 25, 0);  // राइट वॉल

    // --- 3. 3D SHIVA CHARACTER DEFINITION (शिवा का निर्माण) ---
    const shiva = new THREE.Group();

    // 1. पैर (नीली पैंट और जूते)
    const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.6, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x2563eb }); // ब्लू पैंट
    
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.2, 0.3, 0);
    shiva.add(leftLeg);

    const rightLeg = new THREE.Mesh(legGeo, legMat);
    rightLeg.position.set(0.2, 0.3, 0);
    shiva.add(rightLeg);

    // 2. शरीर/टी-शर्ट (लाल रंग टी-शर्ट)
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.25, 0.8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xdc2626 }); // रेड टी-शर्ट
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.9;
    shiva.add(body);

    // 3. सिर और बाल (काला बाल और स्किन टोन चेहरा)
    const headGeo = new THREE.SphereGeometry(0.28, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffedd5 }); // स्किन कलर
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.4;
    shiva.add(head);

    // शिवा के काले बाल
    const hairGeo = new THREE.SphereGeometry(0.3, 16, 16, 0, Math.PI*2, 0, Math.PI/2);
    const hairMat = new THREE.MeshStandardMaterial({ color: 0x111827 }); // ब्लैक हेयर
    const hair = new THREE.Mesh(hairGeo, hairMat);
    hair.position.y = 1.45;
    shiva.add(hair);

    // 4. शिवा की गन
    const gunGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.6, 8);
    const gunMat = new THREE.MeshStandardMaterial({ color: 0x1f2937 });
    const gun = new THREE.Mesh(gunGeo, gunMat);
    gun.rotation.x = Math.PI / 2;
    gun.position.set(0.35, 0.9, -0.4);
    shiva.add(gun);

    shiva.position.set(0, 0, 15); // सीधा खड़ा प्लेयर पोजीशन
    scene.add(shiva);

    // --- 4. ENEMIES (दुश्मन रोबोट्स) ---
    let enemies = [];
    function spawnEnemy(x, z) {
      const eGroup = new THREE.Group();
      
      const eBodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
      const eBodyMat = new THREE.MeshStandardMaterial({ color: 0x1e293b }); // डार्क विलेन बॉडी
      const eBody = new THREE.Mesh(eBodyGeo, eBodyMat);
      eBody.position.y = 0.6;
      eGroup.add(eBody);

      const eEyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
      const eEyeMat = new THREE.MeshBasicMaterial({ color: 0xef4444 }); // लाल आँखें
      const eEye = new THREE.Mesh(eEyeGeo, eEyeMat);
      eEye.position.set(0, 0.9, -0.4);
      eGroup.add(eEye);

      eGroup.position.set(x, 0, z);
      scene.add(eGroup);
      enemies.push({ mesh: eGroup, vx: (Math.random() - 0.5) * 0.06, vz: (Math.random() - 0.5) * 0.06 });
    }
    
    // महल में दुश्मनों को खड़ा करना
    spawnEnemy(-6, -5);
    spawnEnemy(6, -8);
    spawnEnemy(-3, -15);
    spawnEnemy(4, 2);

    let bullets = [];

    // --- 5. UI CONTROLS INPUT ---
    let keys = { up: false, down: false, left: false, right: false };
    function bindBtn(id, prop) {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[prop] = true; });
      btn.addEventListener('touchend', () => { keys[prop] = false; });
    }
    bindBtn('btn-up', 'up');
    bindBtn('btn-down', 'down');
    bindBtn('btn-left', 'left');
    bindBtn('btn-right', 'right');

    // फायरिंग मैकेनिज्म
    document.getElementById('btn-fire').addEventListener('touchstart', (e) => {
      e.preventDefault();
      const bGeo = new THREE.SphereGeometry(0.15, 8, 8);
      const bMat = new THREE.MeshBasicMaterial({ color: 0xfacc15 }); // सुनहरी 3D गोली
      const bullet = new THREE.Mesh(bGeo, bMat);
      bullet.position.set(shiva.position.x, shiva.position.y + 0.9, shiva.position.z);
      
      let speed = 0.4;
      let vx = Math.sin(shiva.rotation.y) * -speed;
      let vz = Math.cos(shiva.rotation.y) * -speed;

      scene.add(bullet);
      bullets.push({ mesh: bullet, vx: vx, vz: vz, life: 50 });
    });

    // --- 6. GAME ANIMATION LOOP ---
    let moveSpeed = 0.14;
    let turnSpeed = 0.045;

    function animate() {
      requestAnimationFrame(animate);

      if (keys.left) shiva.rotation.y += turnSpeed;
      if (keys.right) shiva.rotation.y -= turnSpeed;

      if (keys.up) {
        shiva.position.x += Math.sin(shiva.rotation.y) * -moveSpeed;
        shiva.position.z += Math.cos(shiva.rotation.y) * -moveSpeed;
      }
      if (keys.down) {
        shiva.position.x -= Math.sin(shiva.rotation.y) * -moveSpeed;
        shiva.position.z -= Math.cos(shiva.rotation.y) * -moveSpeed;
      }

      // 🎥 कैमरा शिवा के पीछे रहेगा (3rd Person Gaming View)
      camera.position.x = shiva.position.x + Math.sin(shiva.rotation.y) * 5.5;
      camera.position.z = shiva.position.z + Math.cos(shiva.rotation.y) * 5.5;
      camera.position.y = shiva.position.y + 3.2;
      camera.lookAt(new THREE.Vector3(shiva.position.x, shiva.position.y + 0.8, shiva.position.z));

      // गोलियों को चलाना और टक्कर डिटेक्ट करना
      for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.mesh.position.x += b.vx;
        b.mesh.position.z += b.vz;
        b.life--;

        for (let j = enemies.length - 1; j >= 0; j--) {
          let e = enemies[j];
          let dist = b.mesh.position.distanceTo(e.mesh.position);
          if (dist < 0.9) {
            scene.remove(e.mesh);
            enemies.splice(j, 1);
            scene.remove(b.mesh);
            bullets.splice(i, 1);
            document.getElementById('enemy-count').innerText = enemies.length;
            break;
          }
        }

        if (b.life <= 0 && bullets[i]) {
          scene.remove(b.mesh);
          bullets.splice(i, 1);
        }
      }

      // दुश्मनों का मूवमेंट
      enemies.forEach(e => {
        e.mesh.position.x += e.vx;
        e.mesh.position.z += e.vz;

        if (Math.abs(e.mesh.position.x) > 23) e.vx *= -1;
        if (Math.abs(e.mesh.position.z) > 23) e.vz *= -1;

        if (shiva.position.distanceTo(e.mesh.position) < 1.1) {
          alert("😢 दुश्मन ने शिवा को हरा दिया! दोबारा कोशिश करें।");
          shiva.position.set(0, 0, 15);
        }
      });

      if (enemies.length === 0) {
        alert("🏆 शानदार अभिनंदन! शिवा ने महल के सारे दुश्मनों को खत्म कर दिया!");
        location.reload();
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
